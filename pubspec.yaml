publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  speech_to_text: ^7.0.0
  image_picker: ^1.1.0
  flutter_native_splash: ^2.4.0
  share_plus: ^10.0.0
  flutter_markdown: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
